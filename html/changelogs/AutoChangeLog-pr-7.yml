author: "tgstation"
delete-after: True
changes:
  - bugfix: "fixed tail lash going through walls <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18698) -->"
  - balance: "Abduct windup now scales with range <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18705) -->"
  - balance: "Abduct CD increased to 18 seconds from 12 <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18705) -->"
  - balance: "Abduct stagger reduced to 1 second from 3 seconds per human caught <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18705) -->"
  - bugfix: "Abduct can be properly cancelled by stuns and stagger <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18705) -->"
  - rscadd: "HMG-08 ammo from Zombie Crash vendor is now the normal variant (500 bullets). <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18707) -->"
  - bugfix: "Removing job positions now bottoms out at 0 <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18709) -->"
  - bugfix: "Abduct's self-knockdown is no longer reclusive and thus does not self-knockdown for a absurd amount of time. <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18712) -->"
  - balance: "SH-15 slugs reduced to 20 AP from 30 <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18714) -->"
  - balance: "SH-15 flechette increased to 20 AP from 15 <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18714) -->"
  - balance: "Campaign: The standard SH-15 has a bayonet instead of a barrel charger <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18714) -->"
  - imageadd: "All large ammo/shotgun shell boxes have inhand and back slot sprites <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18700) -->"
  - code_imp: "Large ammo boxes and large shotgun shell boxes are now the same typepath. All must be deployed to be used <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18700) -->"
  - balance: "Loading magazines using large ammo boxes takes 0.5 seconds instead of 1.5 seconds <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18700) -->"
  - qol: "You can undeploy and pick up large ammo boxes by right clicking them, in addition to click dragging to yourself <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18700) -->"
  - bugfix: "Fixed some Kutjevo tiles going black or having other visual issues <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18711) -->"
  - bugfix: "Ship catwalk tiles actually update as expected when the catwalk is removed <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18711) -->"
  - bugfix: "fixed some footstep overrides applying in the wrong order <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18691) -->"
  - bugfix: "Acid Dash cannot be activated if you are in a middle of a leap. <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18693) -->"
  - spellcheck: "Acid Dash's description correctly tells you that you're dashing through people, not pouncing onto people. <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18693) -->"
  - refactor: "Refactors Acid Dash in general and adds support for multiple recasts. <!-- (www.github.com/tgstation/TerraGov-Marine-Corps/pull/18693) -->"